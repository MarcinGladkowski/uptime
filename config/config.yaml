endpoints:
  - name: bdtprojekt-pl
    url: https://bdtprojekt.pl
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"
      - "[CERTIFICATE_EXPIRATION] > 168h"
    alerts:
      - type: github
        failure-threshold: 2
        success-threshold: 2
        send-on-resolved: true
        description: "bdtprojekt.pl is down or certificate expiring soon"

