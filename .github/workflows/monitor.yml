name: Uptime Monitor

on:
  schedule:
    - cron: '0 7,18 * * *'
  workflow_dispatch:

jobs:
  monitor:
    name: Check projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Gatus
        run: |
          docker run -d \
            --name gatus \
            -v ${{ github.workspace }}/config:/config \
            -p 8080:8080 \
            twinproduction/gatus:latest

      - name: Wait for initial health check
        run: sleep 35

      - name: Fetch results from Gatus API
        id: results
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/api/v1/endpoints/statuses)

          echo "### Gatus Health Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "$RESPONSE" | jq -r '
            .[] |
            "**Endpoint:** \(.name)  " +
            "**Last check:** \(.results[-1].timestamp)  " +
            "**Status:** \(if .results[-1].success then "✅ UP" else "❌ DOWN" end)  " +
            "**Response time:** \(.results[-1].duration / 1000000)ms  " +
            "**HTTP status:** \(.results[-1].httpStatus)"
          ' >> "$GITHUB_STEP_SUMMARY"

          ANY_DOWN=$(echo "$RESPONSE" | jq '[.[] | .results[-1].success] | any(. == false)')
          echo "any_down=${ANY_DOWN}" >> "$GITHUB_OUTPUT"

      - name: Stop Gatus
        if: always()
        run: docker rm -f gatus || true

      - name: Fail if any site is down
        if: steps.results.outputs.any_down == 'true'
        run: |
          echo "::error::One or more monitored endpoints are DOWN!"
          exit 1
