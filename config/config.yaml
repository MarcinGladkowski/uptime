endpoints:
  - name: bdtprojekt-pl
    url: https://bdtprojekt.pl
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"
    alerts:
      - type: github
        failure-threshold: 2
        success-threshold: 2
        send-on-resolved: true
        description: "bdtprojekt.pl is down"

  - name: bb-tech-com-pl
    url: https://bb-tech.com.pl
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"
    alerts:
      - type: github
        failure-threshold: 2
        success-threshold: 2
        send-on-resolved: true
        description: "bb-tech.com.pl is down"

  - name: gladiatorgokartgames-com
    url: https://gladiatorgokartgames.com
    interval: 30s
